apiVersion: v1
kind: Service
metadata:
  name: traverse
  namespace: traverse
  labels:
    app.kubernetes.io/name: traverse
    app.kubernetes.io/component: server
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 8080
    targetPort: http
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: metrics
    protocol: TCP
  - name: health
    port: 8081
    targetPort: health
    protocol: TCP
  selector:
    app.kubernetes.io/name: traverse
    app.kubernetes.io/component: server
---
# External-facing ingress (optional)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: traverse
  namespace: traverse
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - traverse.company.com
    secretName: traverse-tls
  rules:
  - host: traverse.company.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: traverse
            port:
              number: 8080
