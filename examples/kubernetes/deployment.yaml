apiVersion: apps/v1
kind: Deployment
metadata:
  name: traverse
  namespace: traverse
  labels:
    app.kubernetes.io/name: traverse
    app.kubernetes.io/component: server
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: traverse
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: traverse
        app.kubernetes.io/component: server
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: traverse
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: traverse
        image: funkymonkeymonk/traverse:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        - name: metrics
          containerPort: 9090
          protocol: TCP
        - name: health
          containerPort: 8081
          protocol: TCP
        env:
        - name: OP_CONNECT_TOKEN
          valueFrom:
            secretKeyRef:
              name: traverse-secrets
              key: OP_CONNECT_TOKEN
        - name: SLACK_BOT_TOKEN
          valueFrom:
            secretKeyRef:
              name: traverse-secrets
              key: SLACK_BOT_TOKEN
        - name: API_KEY_1
          valueFrom:
            secretKeyRef:
              name: traverse-secrets
              key: API_KEY_1
        - name: API_KEY_2
          valueFrom:
            secretKeyRef:
              name: traverse-secrets
              key: API_KEY_2
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: traverse-secrets
              key: DB_PASSWORD
        volumeMounts:
        - name: config
          mountPath: /etc/traverse
          readOnly: true
        - name: tls
          mountPath: /etc/traverse/certs
          readOnly: true
        livenessProbe:
          httpGet:
            path: /health
            port: health
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: health
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
      volumes:
      - name: config
        projected:
          sources:
          - configMap:
              name: traverse-config
              items:
              - key: config.yaml
                path: config.yaml
      - name: tls
        secret:
          secretName: traverse-tls
          items:
          - key: tls.crt
            path: tls.crt
          - key: tls.key
            path: tls.key
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app.kubernetes.io/name
                  operator: In
                  values:
                  - traverse
              topologyKey: kubernetes.io/hostname
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: traverse
  namespace: traverse
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: traverse
  namespace: traverse
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]
  resourceNames: ["traverse-secrets", "traverse-tls"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: traverse
  namespace: traverse
subjects:
- kind: ServiceAccount
  name: traverse
  namespace: traverse
roleRef:
  kind: Role
  name: traverse
  apiGroup: rbac.authorization.k8s.io
