apiVersion: v1
kind: ConfigMap
metadata:
  name: traverse-config
  namespace: traverse
data:
  config.yaml: |
    server:
      host: "0.0.0.0"
      port: 8080
      tls:
        cert_file: "/etc/traverse/certs/tls.crt"
        key_file: "/etc/traverse/certs/tls.key"
      
    auth:
      type: "api_key"
      api_keys:
        - key: "${API_KEY_1}"
          client_id: "k8s-ci-runner"
          allowed_paths: ["prod/*", "shared/*"]
          rate_limit: 30
          
        - key: "${API_KEY_2}"
          client_id: "deployment-bot"
          allowed_paths: ["prod/api-keys/*"]
          rate_limit: 10
    
    providers:
      default: "1password"
      
      1password:
        type: "1password-connect"
        host: "http://op-connect-api:8080"
        token: "${OP_CONNECT_TOKEN}"
        timeout: "10s"
        retry:
          max_retries: 3
          backoff: "exponential"
    
    notifications:
      default: ["slack"]
      
      slack:
        bot_token: "${SLACK_BOT_TOKEN}"
        approver_channel: "#security-approvals"
        dm_users: true
    
    policies:
      default:
        required_approvals: 1
        max_duration: "1h"
        request_timeout: "5m"
        allow_self_approval: false
        require_justification: true
        
      overrides:
        - path_pattern: "prod/database/*"
          required_approvals: 2
          max_duration: "30m"
          approver_groups: ["dba-oncall"]
          notification_channels: ["pagerduty", "slack"]
    
    storage:
      type: "postgresql"
      postgresql:
        host: "postgres.traverse.svc.cluster.local"
        port: 5432
        database: "traverse"
        user: "traverse"
        password: "${DB_PASSWORD}"
        ssl_mode: "require"
        max_connections: 20
    
    audit:
      type: "stdout"
    
    metrics:
      enabled: true
      type: "prometheus"
      prometheus:
        port: 9090
        path: "/metrics"
    
    health:
      enabled: true
      port: 8081
      path: "/health"
