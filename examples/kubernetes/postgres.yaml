# PostgreSQL StatefulSet for Traverse
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: traverse
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: traverse
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        ports:
        - containerPort: 5432
          name: postgres
        env:
        - name: POSTGRES_USER
          value: "traverse"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: traverse-secrets
              key: DB_PASSWORD
        - name: POSTGRES_DB
          value: "traverse"
        - name: PGDATA
          value: "/var/lib/postgresql/data/pgdata"
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - traverse
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - traverse
          initialDelaySeconds: 5
          periodSeconds: 5
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: traverse
  labels:
    app.kubernetes.io/name: postgres
spec:
  type: ClusterIP
  ports:
  - port: 5432
    targetPort: 5432
  selector:
    app.kubernetes.io/name: postgres
---
# 1Password Connect Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: op-connect-api
  namespace: traverse
  labels:
    app.kubernetes.io/name: op-connect-api
    app.kubernetes.io/part-of: traverse
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: op-connect-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: op-connect-api
    spec:
      containers:
      - name: connect-api
        image: 1password/connect-api:latest
        ports:
        - containerPort: 8080
          name: http
        volumeMounts:
        - name: credentials
          mountPath: /home/opuser/.op/1password-credentials.json
          subPath: 1password-credentials.json
          readOnly: true
        - name: data
          mountPath: /home/opuser/.op/data
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
      volumes:
      - name: credentials
        secret:
          secretName: op-credentials
      - name: data
        emptyDir: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: op-connect-sync
  namespace: traverse
  labels:
    app.kubernetes.io/name: op-connect-sync
    app.kubernetes.io/part-of: traverse
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: op-connect-sync
  template:
    metadata:
      labels:
        app.kubernetes.io/name: op-connect-sync
    spec:
      containers:
      - name: connect-sync
        image: 1password/connect-sync:latest
        volumeMounts:
        - name: credentials
          mountPath: /home/opuser/.op/1password-credentials.json
          subPath: 1password-credentials.json
          readOnly: true
        - name: data
          mountPath: /home/opuser/.op/data
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
      volumes:
      - name: credentials
        secret:
          secretName: op-credentials
      - name: data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: op-connect-api
  namespace: traverse
  labels:
    app.kubernetes.io/name: op-connect-api
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
  selector:
    app.kubernetes.io/name: op-connect-api
---
# External Secret for 1Password credentials
apiVersion: v1
kind: Secret
metadata:
  name: op-credentials
  namespace: traverse
type: Opaque
stringData:
  # Base64-encoded 1Password credentials.json content
  1password-credentials.json: |
    {"verifier":{"salt":"...","localHash":"..."},"encCredentials":{"kid":"...","enc":"..."}}
