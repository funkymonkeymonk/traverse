apiVersion: v1
kind: Secret
metadata:
  name: traverse-secrets
  namespace: traverse
type: Opaque
stringData:
  # Base64 encode these values: echo -n 'value' | base64
  # Or use: kubectl create secret generic traverse-secrets \
  #   --from-literal=OP_CONNECT_TOKEN=... \
  #   --from-literal=SLACK_BOT_TOKEN=... \
  #   --namespace=traverse
  
  OP_CONNECT_TOKEN: "your-1password-connect-token-here"
  SLACK_BOT_TOKEN: "xoxb-your-slack-bot-token-here"
  API_KEY_1: "your-first-api-key"
  API_KEY_2: "your-second-api-key"
  DB_PASSWORD: "your-database-password"
